server
{
    listen 80;
    listen [::]:80;
    server_name translate.air-inc.top;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/translate.air-inc.top;
    include /www/server/panel/vhost/nginx/extension/translate.air-inc.top/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/translate.air-inc.top.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    #SSL-END

    #ERROR-PAGE-START
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/html_translate.air-inc.top.conf;
    #REWRITE-END

    # Disable cache for Flutter critical files.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }
    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }

    #API-PROXY-START /api -> Node 9001
    location ^~ /api {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }
    #API-PROXY-END

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~* \.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~* \.(js|css)$
    {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log /www/wwwlogs/translate.air-inc.top.log;
    error_log /www/wwwlogs/translate.air-inc.top.error.log;
}
