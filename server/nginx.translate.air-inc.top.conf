server {
    listen 80;
    listen [::]:80;
    server_name translate.air-inc.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name translate.air-inc.top;

    index index.html index.htm default.htm default.html;
    root /www/wwwroot/translate.air-inc.top;

    # SSL 证书配置（宝塔面板会自动填充）
    ssl_certificate /www/server/panel/vhost/cert/translate.air-inc.top/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/translate.air-inc.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!DHE:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 禁用 Flutter 关键文件缓存
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }
    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }

    # API 代理 - 支持流式响应
    location ^~ /api {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|ico|svg|webp)$ {
        expires 30d;
        access_log off;
    }
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|git|gitignore|md|json|lock|log|bak|sql|sh|bat|ps1)$ {
        deny all;
    }

    access_log /www/wwwlogs/translate.air-inc.top.log;
    error_log /www/wwwlogs/translate.air-inc.top.error.log;
}
