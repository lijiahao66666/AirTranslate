# HTML 站点 (translate.air-inc.top / 122.51.10.98) 增加 /api 反向代理
# 使 Web 与 API 同源，未备案时用公网 IP 访问可避免 CORS
#
# 在 #REWRITE-START 之前插入以下 location 块：

    #API-PROXY-START 将 /api 和 /api/* 转发到 Node 9001（必须匹配 /api 无尾斜杠，否则 301 会把 POST 转成 GET）
    location ^~ /api {
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass http://127.0.0.1:9001;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    #API-PROXY-END
